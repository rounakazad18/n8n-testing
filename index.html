<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>City Punks | Cyberpunk AI Game</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-black text-white overflow-x-hidden">

    <nav class="fixed w-full z-50 flex justify-between items-center px-10 py-6 bg-gradient-to-b from-black/80 to-transparent">
        <div class="text-2xl font-bold tracking-tighter text-red-500">CITY PUNKS</div>
        <div class="hidden md:flex gap-8 text-sm uppercase tracking-widest">
            <a href="#" class="hover:text-red-500 transition">Game</a>
            <a href="#" class="hover:text-red-500 transition">Features</a>
            <a href="#" class="hover:text-red-500 transition">News</a>
        </div>
        <button class="md:hidden text-3xl">☰</button>
    </nav>

    <section class="relative h-screen w-full flex items-end pb-20 px-10 overflow-hidden">
        <video autoplay muted loop class="absolute inset-0 w-full h-full object-cover z-0 opacity-70">
            <source src="hero-video.mp4" type="video/mp4">
        </video>
        
        <div class="absolute inset-0 z-10 pointer-events-none bg-[linear-gradient(rgba(18,16,16,0)_50%,rgba(0,0,0,0.25)_50%),linear-gradient(90deg,rgba(255,0,0,0.06),rgba(0,255,0,0.02),rgba(0,0,255,0.06))] bg-[length:100%_2px,3px_100%]"></div>

        <div class="relative z-20 max-w-4xl">
            <h1 class="text-8xl font-black italic uppercase glitch-text mb-6 leading-none">
                City <br> <span class="text-red-600">Punks</span>
            </h1>
            <p class="text-lg text-gray-300 max-w-md mb-8 border-l-4 border-red-600 pl-4">
                The neon streets of the future are calling. Survive the augmentation wars in the ultimate AI-driven RPG.
            </p>
            <button class="bg-red-600 hover:bg-white hover:text-black text-white font-bold py-4 px-10 uppercase tracking-widest transition-all duration-300">
                Play the Game
            </button>
        </div>
    </section>

    <section class="py-32 px-10 bg-zinc-950">
        <div class="grid md:grid-cols-2 gap-10">
            <div class="group relative overflow-hidden h-[500px]">
                <img src="feature1.jpg" class="w-full h-full object-cover transition duration-700 group-hover:scale-110 grayscale group-hover:grayscale-0">
                <div class="absolute bottom-0 p-8 bg-gradient-to-t from-black to-transparent w-full">
                    <h3 class="text-3xl font-bold italic uppercase">Cyber Augmentation</h3>
                </div>
            </div>
            <div class="group relative overflow-hidden h-[500px]">
                <img src="feature2.jpg" class="w-full h-full object-cover transition duration-700 group-hover:scale-110 grayscale group-hover:grayscale-0">
                <div class="absolute bottom-0 p-8 bg-gradient-to-t from-black to-transparent w-full">
                    <h3 class="text-3xl font-bold italic uppercase">Neon Districts</h3>
                </div>
            </div>
        </div>
    </section>

    <section class="py-20 px-10">
        <h2 class="text-4xl font-bold italic uppercase mb-12">Latest News</h2>
        <div class="grid md:grid-cols-3 gap-6">
            <div class="bg-zinc-900 p-6 border-b-2 border-transparent hover:border-red-600 transition">
                <span class="text-red-600 text-xs font-bold uppercase tracking-widest">Update 2.0</span>
                <h4 class="text-xl font-bold mt-2">New District: The Slums</h4>
                <p class="text-gray-400 mt-4">Explore the dark underbelly of the city...</p>
            </div>
            </div>
    </section>

</body>
</html>
